<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taller — Fuchsia</title>
<link rel="icon" href="/assets/img/fuchsia-icono.png">
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@500;700;900&family=Jost:wght@300;400;500&family=Allerta+Stencil&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/css/styles.css?v=2">
</head>
<body>
<script src="/assets/partials.js?v=2"></script>

<section class="hero" style="padding-top:120px" id="taller-hero">
  <div class="container"><p>Cargando taller...</p></div>
</section>

<section class="crema" style="padding-top:0" id="taller-video-section" hidden>
  <div class="container" style="max-width:420px" id="taller-video"></div>
</section>

<section style="padding-top:0">
  <div class="container" style="max-width:600px">
    <div id="taller-form-zona"></div>
  </div>
</section>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="/assets/js/config.js"></script>
<script src="/assets/js/supabase-init.js"></script>
<script src="/assets/js/main.js?v=2"></script>
<script>
(async () => {
  const slug = new URLSearchParams(location.search).get('slug');
  const hero = document.getElementById('taller-hero');
  const zona = document.getElementById('taller-form-zona');
  if (!slug) { hero.innerHTML = '<div class="container"><p>Taller no encontrado.</p></div>'; return; }

  const { data: t, error } = await window.FUCHSIA_SB.from('talleres').select('*').eq('slug', slug).single();
  if (error || !t) { hero.innerHTML = '<div class="container"><p>Taller no encontrado.</p></div>'; return; }

  hero.querySelector('.container').innerHTML = `
    ${t.imagen_url ? `<img src="${t.imagen_url}" style="max-width:280px;border-radius:18px;margin:0 auto 24px;display:block" alt="${t.titulo}">` : ''}
    <span class="badge-foco">${t.foco || 'Taller Fuchsia'}</span>
    <h1>${t.titulo}</h1>
    <p class="lead">${t.descripcion || ''}</p>`;

  if (t.video_url) {
    const esMp4 = t.video_url.endsWith('.mp4');
    document.getElementById('taller-video').innerHTML = window.FUCHSIA.videoCard(
      esMp4 ? { poster: t.imagen_url, mp4: t.video_url, alt: t.titulo } : { poster: t.imagen_url, link: t.video_url, alt: t.titulo }
    );
    document.getElementById('taller-video-section').hidden = false;
  }

  if (t.estado !== 'proximo') {
    zona.innerHTML = `<p style="text-align:center;color:var(--gris)">Este taller ya finalizó. Síguenos para no perderte el próximo.</p>
      <p style="text-align:center"><a href="/servicios/" class="btn ghost">Ver talleres próximos</a></p>`;
    return;
  }

  const campos = t.campos_inscripcion || [{name:'nombre',label:'Nombre completo',type:'text',required:true},{name:'celular',label:'Celular',type:'tel',required:true}];
  zona.innerHTML = `
    <h2 style="text-align:center">Inscríbete aquí</h2>
    <form class="elegant" id="form-inscripcion" style="margin:0 auto">
      ${campos.map(c => {
        const condName = c.condicional_name || (c.name + '_detalle');
        const campoHtml = c.type === 'select' && c.options ? `
          <select name="${c.name}" ${c.required ? 'required' : ''}>
            <option value="" disabled selected>Selecciona una opción</option>
            ${c.options.map(o => `<option value="${o}">${o}</option>`).join('')}
          </select>` : `<input name="${c.name}" type="${c.type||'text'}" ${c.required ? 'required' : ''}>`;
        const condicionalHtml = c.condicional ? `
          <div class="campo-condicional" data-for="${c.name}" hidden>
            <label class="campo-condicional-label"></label>
            <input name="${condName}" type="text">
          </div>` : '';
        return `<div><label>${c.label}${c.required ? ' *' : ''}</label>${campoHtml}</div>${condicionalHtml}`;
      }).join('')}
      <button type="submit" class="btn">${(t.link_pago_preventa || t.link_pago_regular) ? 'Continuar al pago' : 'Registrarme'}</button>
      <p id="form-msg" style="color:var(--gris);font-size:.85rem"></p>
    </form>`;

  campos.filter(c => c.condicional).forEach(c => {
    const select = document.querySelector(`select[name="${c.name}"]`);
    const wrap = document.querySelector(`.campo-condicional[data-for="${c.name}"]`);
    const label = wrap.querySelector('.campo-condicional-label');
    const input = wrap.querySelector('input');
    select.addEventListener('change', () => {
      const texto = c.condicional[select.value];
      if (texto) {
        label.textContent = texto + ' *';
        input.required = true;
        wrap.hidden = false;
      } else {
        wrap.hidden = true;
        input.required = false;
        input.value = '';
      }
    });
  });

  document.getElementById('form-inscripcion').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.querySelector('#form-inscripcion button[type=submit]');
    const msg = document.getElementById('form-msg');
    const textoOriginal = btn.textContent;
    btn.disabled = true;
    btn.textContent = 'Enviando...';
    msg.textContent = '';
    try {
      const fd = new FormData(e.target);
      const datos = {}; fd.forEach((v,k) => datos[k] = v);
      const { error: insErr } = await window.FUCHSIA_SB.from('registros_talleres').insert({ taller_id: t.id, datos });
      if (insErr) throw insErr;

      const hoy = new Date().toISOString().slice(0,10);
      const enPreventa = t.fecha_limite_preventa && hoy <= t.fecha_limite_preventa;
      const link = enPreventa ? t.link_pago_preventa : t.link_pago_regular;
      if (link) { window.location.href = link; return; }
      msg.textContent = '¡Listo, quedaste registrado/a! Nos vemos en el taller.';
      btn.textContent = 'Registrado';
    } catch (err) {
      console.error(err);
      msg.textContent = 'Hubo un error al registrar, intenta de nuevo o escríbenos por WhatsApp.';
      btn.disabled = false;
      btn.textContent = textoOriginal;
    }
  });
})();
</script>
</body>
</html>
